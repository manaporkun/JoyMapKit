name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          swift build -c release
          VERSION="${GITHUB_REF_NAME#v}"

          # Create .app bundle
          APP_DIR="JoyMapKit.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"
          cp .build/release/JoyMapKitApp "$APP_DIR/MacOS/JoyMapKit"
          cp Distribution/Info.plist "$APP_DIR/"
          if [ -f Distribution/AppIcon.icns ]; then
            cp Distribution/AppIcon.icns "$APP_DIR/Resources/"
          fi
          strip "$APP_DIR/MacOS/JoyMapKit"

          # Zip the .app
          ARCHIVE="JoyMapKit-${VERSION}.zip"
          ditto -c -k --keepParent JoyMapKit.app "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true

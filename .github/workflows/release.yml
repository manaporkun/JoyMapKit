name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          swift build -c release
          VERSION="${GITHUB_REF_NAME#v}"

          # Create .app bundle
          APP_DIR="JoyMapKit.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"
          cp .build/release/JoyMapKitApp "$APP_DIR/MacOS/JoyMapKit"
          cp Distribution/Info.plist "$APP_DIR/"
          if [ -f Distribution/AppIcon.icns ]; then
            cp Distribution/AppIcon.icns "$APP_DIR/Resources/"
          fi
          strip "$APP_DIR/MacOS/JoyMapKit"

          # Create DMG with drag-to-Applications
          DMG_DIR="/tmp/dmg-staging"
          mkdir -p "$DMG_DIR"
          cp -R JoyMapKit.app "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "JoyMapKit" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "JoyMapKit-${VERSION}.dmg"

          echo "DMG=JoyMapKit-${VERSION}.dmg" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG }}
          generate_release_notes: true
